name: platform-v2-ci
on:
  push:
    paths:
      - 'platform-v2/**'
  pull_request:
    paths:
      - 'platform-v2/**'
jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-v2
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'platform-v2/apps/api/**'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate webhook smoke script syntax
        run: bash -n scripts/webhook-smoke.sh
      - run: npm install
      - name: Build API fast check
        if: steps.changes.outputs.api == 'true'
        run: npm run -w apps/api build
      - run: npm run build
