version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6380:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.example
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://platform:platform@postgres:5432/platform?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'
    depends_on:
      - web
      - api

volumes:
  pgdata:
